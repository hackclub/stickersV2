services:
  db:
    env_file:
      - .env
    image: postgres:17
    restart: always
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
  web:
    env_file:
      - .env
    build:
      context: .
      target: dev
      dockerfile: Dockerfile
    container_name: svelte_app
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
volumes:
  pgdata:
