services:
  db:
    env_file:
      - .env
    image: postgres
    restart: always
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql
  web:
    env_file:
      - .env
    build:
      context: .
      target: dev
      dockerfile: Dockerfile
    container_name: svelte_app
    ports:
      - '5173:5173'
    depends_on:
      - db
volumes:
  pgdata:
