services:
  db:
    image: postgres
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: svelte_app
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgres://root:mysecretpassword@db:5432/local
volumes:
  pgdata:
